<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="container">
    <header>
      <h1>🎮 Rock Paper Scissors</h1>
      <p>Choose your move and challenge the computer!</p>
    </header>

    <section class="game-area">
      <div class="buttons">
        <button onclick="play('rock')" class="choice">🪨 Rock</button>
        <button onclick="play('paper')" class="choice">📄 Paper</button>
        <button onclick="play('scissors')" class="choice">✂️ Scissors</button>
      </div>

      <div class="status">
        <div class="player">
          <h3>You</h3>
          <p id="player-choice">—</p>
        </div>
        <div class="computer">
          <h3>Computer</h3>
          <p id="computer-choice">—</p>
        </div>
      </div>

      <div class="result">
        <h2 id="winner">Make your move!</h2>
      </div>
    </section>

    <footer>
      <p>Play • Learn • Enjoy</p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
